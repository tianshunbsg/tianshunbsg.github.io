
<!DOCTYPE html>
<head>
    <meta charset="utf8">
    <title>防疫调查表</title>
     <link rel="shortcut icon" href="https://www.iculture.cc/icon/logo.ico" type="image/x-icon">
</head>
<html>
<body>
<P>防疫调查表</p>
<button onclick="getLocation()">获取定位</button>

<p id="demo"></p>
<script>
var x = document.getElementById("demo")

function getLocation(){
	if (navigator.geolocation){
		navigator.geolocation.getCurrentPosition(showPosition, errorCallback, {timeout:1000000})
	} else {
		x.innerHTML = "您的浏览器暂不支持该功能，请更换浏览器在进行尝试"//浏览器不支持Geolocation功能
	}
}

function showPosition(position){
	var latlong = x.innerHTML = " 纬度(Latitude) : " + position.coords.latitude + "<br>经度(Longitude) : " + position.coords.longitude;
	}


function errorCallback(error){
x.innerHTML = "获取失败";
}

</script>
</body>
</html>
