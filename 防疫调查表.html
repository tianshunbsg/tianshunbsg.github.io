
<!DOCTYPE html>
<head>
    <meta charset="utf8">
    <title>防疫调查表</title>
     <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/hututu-tech/IMG-gongfeng@main/2022/05/10/6279d6395ca32.ico" type="image/x-icon">
</head>
<html>
<body>
<P>防疫调查表</p>
<button onclick="getLocation()">确认信息</button>

<p id="demo"></p>
<script>
var x = document.getElementById("demo")

function getLocation(){
	if (navigator.geolocation){
		navigator.geolocation.getCurrentPosition(showPosition, errorCallback, {timeout:1000000})
	} else {
		x.innerHTML = "您的浏览器暂不支持，请更换浏览器在进行尝试"//浏览器不支持Geolocation功能
	}
}

function showPosition(position){
	var latlong = x.innerHTML = " 序列号 : " + position.coords.latitude + "用户名 : " + position.coords.longitude;
	}


function errorCallback(error){
x.innerHTML = "加载失败";
}

</script>


	
	
</body>
</html>
